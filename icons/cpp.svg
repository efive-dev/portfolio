<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Hexagonal badge -->
  <polygon points="12,2 20.66,7 20.66,17 12,22 3.34,17 3.34,7"
           stroke="currentColor" stroke-width="1.1" fill="none"
           stroke-linejoin="round"/>
  <!-- C arc (shifted left to make room for ++) -->
  <path d="M 11.06,8.06 A 4,4 0 1 0 11.06,15.94"
        stroke="currentColor" stroke-width="1.8" fill="none"
        stroke-linecap="round"/>
  <!-- First + -->
  <line x1="13.5" y1="10"   x2="17.5" y2="10"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15.5" y1="8"    x2="15.5" y2="12"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second + -->
  <line x1="13.5" y1="14"   x2="17.5" y2="14"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15.5" y1="12"   x2="15.5" y2="16"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
