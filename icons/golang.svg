<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Gopher head: large circle -->
  <circle cx="12" cy="13" r="8.5"
          stroke="currentColor" stroke-width="1.3" fill="none"/>

  <!-- Ears: two bumps on top -->
  <circle cx="7.5"  cy="5.8" r="2.2"
          stroke="currentColor" stroke-width="1.2" fill="none"/>
  <circle cx="16.5" cy="5.8" r="2.2"
          stroke="currentColor" stroke-width="1.2" fill="none"/>

  <!-- Eyes: two filled circles -->
  <circle cx="9"  cy="11" r="1.6" fill="currentColor"/>
  <circle cx="15" cy="11" r="1.6" fill="currentColor"/>

  <!-- Eye shine: white dot -->
  <circle cx="9.6"  cy="10.3" r="0.55" fill="white" opacity="0.9"/>
  <circle cx="15.6" cy="10.3" r="0.55" fill="white" opacity="0.9"/>

  <!-- Snout: rounded rectangle -->
  <rect x="8.5" y="13.5" width="7" height="4" rx="2"
        stroke="currentColor" stroke-width="1.1" fill="none"/>

  <!-- Nose: small oval on snout -->
  <ellipse cx="12" cy="14.5" rx="1.3" ry="0.7" fill="currentColor" opacity="0.7"/>

  <!-- Teeth: two small rects below snout -->
  <rect x="10.2" y="17.3" width="1.5" height="1.8" rx="0.3" fill="currentColor" opacity="0.6"/>
  <rect x="12.3" y="17.3" width="1.5" height="1.8" rx="0.3" fill="currentColor" opacity="0.6"/>
</svg>
