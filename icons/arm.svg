<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- IC chip body -->
  <rect x="5" y="5" width="14" height="14" rx="1.5"
        stroke="currentColor" stroke-width="1.3" fill="none"/>

  <!-- Top pins -->
  <line x1="9"  y1="5" x2="9"  y2="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="5" x2="15" y2="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="9"  y1="19" x2="9"  y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="19" x2="15" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Left pins -->
  <line x1="5" y1="9"  x2="2" y2="9"  stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5" y1="15" x2="2" y2="15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="19" y1="9"  x2="22" y2="9"  stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="15" x2="22" y2="15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Pin 1 dot (corner marker) -->
  <circle cx="8.2" cy="8.2" r="1" fill="currentColor"/>
</svg>
