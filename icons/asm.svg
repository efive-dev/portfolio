<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Assembly: address dot + instruction line for 3 rows -->
  <!-- Row 1 -->
  <circle cx="4"  cy="7"  r="1" fill="currentColor" opacity="0.6"/>
  <line x1="7"  y1="7"  x2="21" y2="7"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 2 -->
  <circle cx="4"  cy="12" r="1" fill="currentColor" opacity="0.6"/>
  <line x1="7"  y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 3 -->
  <circle cx="4"  cy="17" r="1" fill="currentColor" opacity="0.6"/>
  <line x1="7"  y1="17" x2="19" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
