<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Steam wisps above cup -->
  <path d="M 8,7 C 8,5 10,5 10,3"
        stroke="currentColor" stroke-width="1.1" fill="none"
        stroke-linecap="round" opacity="0.6"/>
  <path d="M 12,7 C 12,5 14,5 14,3"
        stroke="currentColor" stroke-width="1.1" fill="none"
        stroke-linecap="round" opacity="0.6"/>

  <!-- Mug body: trapezoid (wider at top, narrower at base) -->
  <path d="M 5,9 L 6.5,20 L 17.5,20 L 19,9 Z"
        stroke="currentColor" stroke-width="1.3" fill="none"
        stroke-linejoin="round"/>

  <!-- Mug handle: loop on right side -->
  <path d="M 19,11.5 C 23,11.5 23,17.5 19,17.5"
        stroke="currentColor" stroke-width="1.3" fill="none"
        stroke-linecap="round"/>

  <!-- Saucer -->
  <line x1="3" y1="21.5" x2="21" y2="21.5"
        stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
</svg>
