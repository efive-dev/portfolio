<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Memory chip body (DIP/SOIC outline) -->
  <rect x="5" y="4" width="14" height="16" rx="1.2"
        stroke="currentColor" stroke-width="1.2" fill="none"/>

  <!-- Left pins (3) -->
  <line x1="5"  y1="8"  x2="2"  y2="8"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="5"  y1="12" x2="2"  y2="12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="5"  y1="16" x2="2"  y2="16" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Right pins (3) -->
  <line x1="19" y1="8"  x2="22" y2="8"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Lightning bolt (indicates flash / programmable) -->
  <polyline points="14,6 9,13 12.5,13 10,19 15,12 11.5,12"
            stroke="currentColor" stroke-width="1.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
