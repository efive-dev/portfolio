<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Bus line (main wire) -->
  <line x1="2" y1="13" x2="22" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Termination resistors at each end -->
  <rect x="1"  y="11.2" width="2.2" height="3.6" rx="0.4" fill="currentColor"/>
  <rect x="20.8" y="11.2" width="2.2" height="3.6" rx="0.4" fill="currentColor"/>

  <!-- Left node stub + box -->
  <line x1="7"  y1="13" x2="7"  y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="4.2" y="5"   width="5.6" height="4" rx="0.8"
        stroke="currentColor" stroke-width="1.1" fill="none"/>

  <!-- Right node stub + box -->
  <line x1="17" y1="13" x2="17" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="14.2" y="5"  width="5.6" height="4" rx="0.8"
        stroke="currentColor" stroke-width="1.1" fill="none"/>
</svg>
