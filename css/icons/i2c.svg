<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- SCL line (top) -->
  <line x1="2" y1="9"  x2="22" y2="9"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

  <!-- SDA line (bottom) -->
  <line x1="2" y1="15" x2="22" y2="15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Device stubs (connect both lines) -->
  <line x1="8"  y1="9"  x2="8"  y2="15" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="16" y1="9"  x2="16" y2="15" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Pull-up resistors (dashed lines to Vcc) -->
  <line x1="8"  y1="9" x2="8"  y2="4" stroke="currentColor" stroke-width="1.0"
        stroke-linecap="round" stroke-dasharray="1.5 1.5" opacity="0.7"/>
  <line x1="16" y1="9" x2="16" y2="4" stroke="currentColor" stroke-width="1.0"
        stroke-linecap="round" stroke-dasharray="1.5 1.5" opacity="0.7"/>

  <!-- Vcc rail -->
  <line x1="5" y1="4" x2="19" y2="4" stroke="currentColor" stroke-width="1.1"
        stroke-linecap="round" opacity="0.5"/>

  <!-- GND dots at device stubs -->
  <circle cx="8"  cy="15" r="1.1" fill="currentColor" opacity="0.6"/>
  <circle cx="16" cy="15" r="1.1" fill="currentColor" opacity="0.6"/>
</svg>
