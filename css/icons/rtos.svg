<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- RTOS scheduler: three tasks as Gantt bars at different widths -->
  <!-- Timeline axis -->
  <line x1="2" y1="20" x2="22" y2="20" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Task 1 — runs early, shorter -->
  <rect x="2"  y="5"  width="10" height="3.5" rx="0.5" fill="currentColor" opacity="0.9"/>

  <!-- Task 2 — runs mid, longest -->
  <rect x="2"  y="10.25" width="16" height="3.5" rx="0.5" fill="currentColor" opacity="0.7"/>

  <!-- Task 3 — runs latest, medium -->
  <rect x="2"  y="15.5" width="7"  height="3.5" rx="0.5" fill="currentColor" opacity="0.45"/>
</svg>
